name: Publish to GitHub Pages

# Pages serves from the gh-pages branch (auto-enabled when that branch
# was first pushed). This mirrors main into gh-pages so main stays the
# only branch anyone edits.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
